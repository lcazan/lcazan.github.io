<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Snoozing Builder | v4.3.67</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --admin-bg: #1e1e1e; --panel-bg: #2d2d2d; --brand-pink: #ebd5c9; --side-w: 4.6875rem; --head-h: 3.125rem; --tool-h: 3rem; }
        
        /* Fixed Layout - No Flex Crap */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #111; display: block; }

        #sidebar { 
            position: fixed; top: 0; left: 0; width: var(--side-w); height: 100vh; 
            background: var(--panel-bg); border-right: 0.125rem solid #000;
            display: flex; flex-direction: column; align-items: center; 
            padding: 0.9375rem 0; z-index: 3000; box-sizing: border-box;
            overflow-y: auto; scrollbar-width: none;
        }
        #sidebar::-webkit-scrollbar { display: none; }

        #header-area { 
            position: fixed; top: 0; left: var(--side-w); right: 0; height: var(--head-h); 
            background: #222; border-bottom: 0.0625rem solid #000; 
            display: flex; align-items: center; justify-content: center; z-index: 1001; 
        }

        #sticky-toolbar { 
            position: fixed; top: var(--head-h); left: var(--side-w); right: 0; height: var(--tool-h); 
            background: #1a1a1a; border-bottom: 0.0625rem solid #000; 
            display: flex; align-items: center; justify-content: center; z-index: 1001; 
        }

        /* 90% Width Centered Toolbar Content */
        #toolbar-content { position: relative; width: 90%; height: 2.2rem; visibility: hidden; }

        .tool-btn, .tool-input, .color-swatch { 
            position: absolute; top: 0; height: 2.2rem; transition: width 0.25s ease-out; box-sizing: border-box; 
        }

        .tool-btn { 
            background: #444; border: 0.0625rem solid #666; color: white; width: 2.2rem; 
            border-radius: 0.25rem; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 12; 
        }

        .tool-input { 
            background: #333; border: 0.0625rem solid #666; color: #fff; padding: 0 8px; 
            border-radius: 0.25rem; font-size: 0.75rem; z-index: 10; width: 45px; 
        }
        
        .color-swatch { width: 2.2rem; border: 1px solid #666; cursor: pointer; border-radius: 0.25rem; z-index: 12; }

        /* Fixed Coordinates */
        .p0 { left: 0px; }
        .p1 { left: 49px; }
        .p2 { left: 98px; }
        .p3 { left: 147px; }
        .p4 { left: 196px; }

        .tool-input:focus { width: 100% !important; z-index: 20 !important; background: #222; outline: 1px solid var(--brand-pink); }

        #frame-wrapper { 
            position: fixed; top: calc(var(--head-h) + var(--tool-h)); left: var(--side-w); right: 0; bottom: 0;
            background: #333; overflow: hidden; 
        }

        #preview-frame { border: none; background: white; transform-origin: top left; position: absolute; top: 0; left: 0; }

        /* UI Buttons */
        .insert-btn { width: 3.75rem; height: 2rem; background: #444; border: 0.0625rem solid #666; color: #fff; margin-bottom: 0.625rem; border-radius: 0.25rem; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; font-weight: bold; flex-shrink: 0; }
        .device-btn { background: transparent; border: none; color: #fff; cursor: pointer; font-size: 1.5rem; margin: 0 0.6rem; }
        .device-btn.active { color: var(--brand-pink); }
        .export-wrap { margin-top: auto; padding-bottom: 40px; }
        .export-btn { width: 3.75rem; height: 3.75rem; background: var(--brand-pink); border: none; color: #000; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; cursor: pointer; }
        .version-status { position: absolute; right: 1.5625rem; top: 0.75rem; color: #fff; font-size: 1rem; font-weight: 800; }
    </style>
</head>
<body>

<div id="sidebar">
    <button class="insert-btn" onclick="insertElement('block_container')"><i class="fa-solid fa-square"></i></button>
    <button class="insert-btn" onclick="triggerImageUpload()"><i class="fa-solid fa-image"></i></button>
    <button class="insert-btn" onclick="insertElement('section_heading')">T1</button>
    <button class="insert-btn" onclick="insertElement('block_heading')">T2</button>
    <button class="insert-btn" onclick="insertElement('block_text')">T3</button>
    <button class="insert-btn" onclick="insertElement('block_button')">Btn</button>
    <button class="insert-btn" onclick="insertElement('block_spacer')"><i class="fa-solid fa-arrows-up-down"></i></button>
    <div class="export-wrap"><button class="export-btn" onclick="exportHTML()"><i class="fa-solid fa-download"></i></button></div>
</div>

<div id="header-area">
    <div id="device-bar">
        <button class="device-btn" id="btn-desktop" onclick="setDevice('desktop')"><i class="fa-solid fa-desktop"></i></button>
        <button class="device-btn" id="btn-android" onclick="setDevice('android')"><i class="fa-solid fa-mobile-screen-button"></i></button>
        <button class="device-btn" id="btn-iphone" onclick="setDevice('iphone')"><i class="fa-solid fa-mobile"></i></button>
    </div>
    <div class="version-status">v4.3.67</div>
</div>

<div id="sticky-toolbar"><div id="toolbar-content"></div></div>

<div id="frame-wrapper"><iframe id="preview-frame" scrolling="yes"></iframe></div>

<input type="file" id="image-upload" style="display:none" accept="image/*" onchange="handleImageUpload(this)">

<script>
    const frame = document.getElementById('preview-frame');
    const toolbarContent = document.getElementById('toolbar-content');
    const wrapper = document.getElementById('frame-wrapper');
    let selectedEl = null; let currentMode = 'iphone'; let isResizing = false;

    async function init() {
        const resp = await fetch('template.html');
        let html = await resp.text();
        html = html.replace('</head>', `
            <style>
                html, body { height: auto; min-height: 100%; margin: 0; padding: 0; overflow-x: hidden; }
                #editor-root { width: 100%; display: flex; flex-direction: column; padding-bottom: 250px; }
                .editable { position: relative; min-height: 1.2em; cursor: pointer; outline: none; box-sizing: border-box; }
                .selected-item { outline: 0.1875rem solid #ebd5c9 !important; }
                .block_container { display: flex; flex-wrap: wrap; align-items: center; width: 100%; min-height: 2rem; box-sizing: border-box; padding: 10px; }
                .block_image { position: relative; display: inline-block; flex-shrink: 0; }
                .block_image img { width: 100%; display: block; pointer-events: none; }
                .div-other-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 1.2em; }
                .resize-handle { width: 44px; height: 44px; position: absolute; right: -2px; bottom: -2px; cursor: nwse-resize; z-index: 9999; display: flex; align-items: center; justify-content: center; color: #ebd5c9; }
                .resize-handle::before { content: "\\f337"; font-family: "Font Awesome 6 Free"; font-weight: 900; font-size: 28px; }
            </style>
            <script>
                const observer = new ResizeObserver(entries => {
                    for (let entry of entries) {
                        const div = entry.target; const width = entry.contentRect.width;
                        const img = div.querySelector('.block_image');
                        const other = div.querySelector('.div-other-wrapper');
                        if (!img) continue;
                        const factor = parseFloat(img.getAttribute('data-scale-factor') || '1.0');
                        if (width <= 744) {
                            div.style.flexDirection = 'column'; img.style.width = (width * factor) + 'px';
                            if(other) other.style.width = '100%';
                        } else {
                            div.style.flexDirection = 'row'; img.style.width = ((width * 0.618) * factor) + 'px';
                            if(other) other.style.width = 'auto';
                        }
                    }
                });
                window.initDivLogic = () => { document.querySelectorAll('.block_container').forEach(d => observer.observe(d)); };
            <\/script>`);
        
        frame.srcdoc = html.replace(/<div class="content-container">([\s\S]*?)<\/div>/, '<div class="content-container" id="editor-root">$1</div>');
        frame.onload = () => {
            frame.contentWindow.initDivLogic();
            frame.contentDocument.addEventListener('mousedown', (e) => { 
                if (isResizing) return;
                const el = e.target.closest('.editable') || e.target.closest('.div-other-wrapper > *') || e.target.closest('.block_spacer') || e.target.closest('.block_container');
                if (el) selectElement(el); else deselectAll(); 
            });
            setDevice('iphone');
        };
    }

    function selectElement(el) {
        frame.contentDocument.querySelectorAll('.resize-handle').forEach(h => h.remove());
        if(selectedEl) selectedEl.classList.remove('selected-item');
        selectedEl = el; selectedEl.classList.add('selected-item');
        if (el.classList.contains('block_image')) addResizeHandle(el);
        renderToolbar();
    }

    function addResizeHandle(el) {
        const handle = frame.contentDocument.createElement('div');
        handle.className = 'resize-handle';
        const startResize = (e) => {
            e.preventDefault(); isResizing = true;
            const startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const startW = el.offsetWidth;
            const scale = wrapper.offsetWidth / (currentMode === 'iphone' ? 393 : currentMode === 'android' ? 448 : 1200);
            const onMove = (mE) => {
                const curX = mE.type.includes('touch') ? mE.touches[0].clientX : mE.clientX;
                let newW = startW + (curX - startX) / scale;
                const parentW = el.closest('.block_container')?.offsetWidth || 1000;
                const limit = (parentW > 744) ? parentW * 0.618 : parentW;
                if (newW > limit) newW = limit;
                el.setAttribute('data-scale-factor', (newW / limit).toFixed(4));
                el.style.width = newW + 'px';
            };
            const onUp = () => { isResizing = false; frame.contentDocument.removeEventListener('mousemove', onMove); frame.contentDocument.removeEventListener('mouseup', onUp); };
            frame.contentDocument.addEventListener('mousemove', onMove);
            frame.contentDocument.addEventListener('mouseup', onUp);
        };
        handle.addEventListener('mousedown', startResize);
        el.appendChild(handle);
    }

    function renderToolbar() {
        if (!selectedEl) return;
        toolbarContent.style.visibility = 'visible';
        const inDiv = selectedEl.closest('.block_container');
        const isBtn = selectedEl.classList.contains('block_button_container');
        const isImg = selectedEl.classList.contains('block_image');
        const isSpacer = selectedEl.classList.contains('block_spacer');
        const isDiv = selectedEl.classList.contains('block_container');
        let html = '';

        if (isDiv) {
            html += `<div class="color-swatch p0" style="background:#FAF6F3" onclick="updateColor('#FAF6F3')"></div>`;
            html += `<input type="color" class="tool-input p1" oninput="updateColor(this.value)">`;
        } else if (isBtn) {
            const link = selectedEl.querySelector('a');
            html += `<input type="text" class="tool-input p0" value="href" onfocus="this.value='${link.getAttribute('href')}'" onblur="updateBtnLink(this.value); this.value='href'">`;
            html += `<input type="text" class="tool-input p1" value="text" onfocus="this.value='${link.innerText}'" onblur="updateBtnText(this.value); this.value='text'">`;
        } else if (isImg) {
            html += `<button class="tool-btn p0" onclick="triggerImageUpload()"><i class="fa-solid fa-sync"></i></button>`;
            html += `<button class="tool-btn p1" onclick="fitToWidth()"><i class="fa-solid fa-arrows-left-right"></i></button>`;
        } else if (isSpacer) {
            html += `<button class="tool-btn p0" onclick="toggleSpacerLine()"><i class="fa-solid fa-underline"></i></button>`;
        } else if (selectedEl.contentEditable === "true") {
            html += `<button class="tool-btn p0" onmousedown="event.preventDefault(); execCmd('bold')"><i class="fa-solid fa-bold"></i></button>`;
            if (!inDiv) {
                html += `<button class="tool-btn p1" onclick="setAlign('left')"><i class="fa-solid fa-align-left"></i></button>`;
                html += `<button class="tool-btn p2" onclick="setAlign('center')"><i class="fa-solid fa-align-center"></i></button>`;
            }
        }
        const trashPos = html.split('p').length - 1; 
        html += `<button class="tool-btn p${trashPos}" style="color:#ff6b6b" onclick="deleteElement()"><i class="fa-solid fa-trash"></i></button>`;
        toolbarContent.innerHTML = html;
    }

    function insertElement(type, data) {
        const doc = frame.contentDocument;
        const tagMap = { 'section_heading': 'h2', 'block_heading': 'h3', 'block_text': 'p' };
        const el = doc.createElement(tagMap[type] || 'div');
        el.className = `editable ${type === 'block_button' ? 'block_button_container' : type}`;
        if(type === 'block_image') { el.innerHTML = `<img src="${data || 'https://via.placeholder.com/400x200'}">`; el.contentEditable = "false"; el.style.width = "200px"; el.setAttribute('data-scale-factor', '1.0'); }
        else if(type === 'block_button') { el.innerHTML = `<a href="#" class="block_button" onclick="return false;">FIND OUT MORE</a>`; el.contentEditable = "false"; }
        else if(type === 'block_spacer' || type === 'block_container') { el.contentEditable = "false"; }
        else { el.innerText = ""; el.setAttribute('data-placeholder', 'Type here...'); el.contentEditable = "true"; }

        const root = doc.getElementById('editor-root');
        const targetDiv = selectedEl?.closest('.block_container');
        if (targetDiv) {
            if (type === 'block_image' && !targetDiv.querySelector('.block_image')) targetDiv.prepend(el);
            else if (type !== 'block_image' && type !== 'block_container') {
                let wrap = targetDiv.querySelector('.div-other-wrapper') || doc.createElement('div');
                wrap.className = 'div-other-wrapper'; targetDiv.appendChild(wrap); wrap.appendChild(el);
            }
        } else { root.appendChild(el); if(type === 'block_container') frame.contentWindow.initDivLogic(); }
        setTimeout(() => selectElement(el), 150);
    }

    function setDevice(type) {
        currentMode = type; document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active')); document.getElementById(`btn-${type}`).classList.add('active');
        const widths = { 'desktop': 1200, 'android': 448, 'iphone': 393 };
        const scaleFactor = Math.min(wrapper.offsetWidth / widths[type], 1);
        frame.style.width = widths[type] + 'px'; frame.style.height = (wrapper.offsetHeight / scaleFactor) + 'px';
        frame.style.transform = `scale(${scaleFactor})`;
        frame.style.left = (scaleFactor < 1) ? '0px' : ((wrapper.offsetWidth - widths[type]) / 2) + 'px';
    }

    function updateColor(v) { if(selectedEl) selectedEl.style.backgroundColor = v; }
    function updateBtnLink(v) { if(selectedEl && v !== 'href') selectedEl.querySelector('a').setAttribute('href', v); }
    function updateBtnText(v) { if(selectedEl && v !== 'text') selectedEl.querySelector('a').innerText = v.toUpperCase(); }
    function deleteElement() { if(selectedEl) { selectedEl.remove(); deselectAll(); } }
    function deselectAll() { if (selectedEl) selectedEl.classList.remove('selected-item'); selectedEl = null; toolbarContent.style.visibility = 'hidden'; }
    function triggerImageUpload() { document.getElementById('image-upload').click(); }
    function handleImageUpload(i) { if(i.files[0]) { const r = new FileReader(); r.onload = e => { if (selectedEl?.classList.contains('block_image')) selectedEl.querySelector('img').src = e.target.result; else insertElement('block_image', e.target.result); }; r.readAsDataURL(i.files[0]); } }
    function fitToWidth() { if(selectedEl) selectedEl.setAttribute('data-scale-factor', '1.0'); }
    function toggleSpacerLine() { if(selectedEl) selectedEl.style.borderBottom = (selectedEl.style.borderBottom.includes('solid')) ? 'none' : '1px solid #eee'; }
    function execCmd(c) { frame.contentDocument.execCommand(c, false, null); }
    function setAlign(p) { if(selectedEl) selectedEl.style.textAlign = p; }
    function exportHTML() { alert('Check console for HTML output'); console.log(frame.contentDocument.documentElement.outerHTML); }

    window.addEventListener('resize', () => setDevice(currentMode));
    window.onload = init;
</script>
</body>
</html>
